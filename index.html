<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel" aria-label="Snake game">
        <header class="panel__header">
          <div>
            <p class="eyebrow">Classic Snake</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </header>

        <div class="status-row">
          <p id="status">Press an arrow key or WASD to start.</p>
          <button id="restart" type="button">Restart</button>
        </div>

        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Snake board"
        ></div>

        <div class="controls" aria-label="Touch controls">
          <button data-direction="up" type="button">Up</button>
          <div class="controls__row">
            <button data-direction="left" type="button">Left</button>
            <button data-direction="down" type="button">Down</button>
            <button data-direction="right" type="button">Right</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./snake.js"></script>
  </body>
</html>
